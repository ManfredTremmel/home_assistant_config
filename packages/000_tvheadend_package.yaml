# ############ HA package to access tvheadend data ############
#
# (C) 2026 Manfred Tremmel
#
# some experiments to access data from tvheadend, based on json api:
# https://docs.tvheadend.org/documentation/development/json-api
#

rest:
  - resource: http://tvheadend.fritz.box:9981/api/dvr/entry/grid_upcoming
    username: !secret tvheadend_username
    password: !secret tvheadend_password
    authentication: digest
    scan_interval: 30
    headers:
      accept: 'application/json'
    binary_sensor:
      - unique_id: "tvheadend_recording_state"
        name: "TVHeadend Recording State"
        device_class: "running"
        value_template: >-
          {{ value_json['entries']
             | rejectattr("enabled", "eq", false)
             | rejectattr("start_real", "gt", as_timestamp(now()))
             | rejectattr("stop_real", "lt", as_timestamp(now()))
             | sort(attribute='start')
             | count > 0 }}
        icon: >
          {% if is_state("binary_sensor.tvheadend_recording_state", "on") %}
            mdi:audio-video
          {% else %}
            mdi:audio-video-off
          {% endif %}
    sensor:
      - unique_id: "tvheadend_recording_count"
        name: "TVHeadend Recording Count"
        value_template: >-
          {{ value_json['entries']
             | rejectattr("enabled", "eq", false)
             | rejectattr("start_real", "gt", as_timestamp(now()))
             | rejectattr("stop_real", "lt", as_timestamp(now()))
             | sort(attribute='start')
             | count }}
        json_attributes_path: "$.entries[0]"
        json_attributes:
            - "disp_title"
            - "disp_subtitle"
            - "disp_description"
            - "channelname"
        icon: >
          {% if is_state("sensor.tvheadend_recording_count", 0) %}
            mdi:audio-video-off
          {% else %}
            mdi:audio-video
          {% endif %}
